# Netlify build configuration for Vite React SPA
# Deploy settings: connect this repo in Netlify UI and these values are used automatically

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Redirect www to non-www (must come before catch-all)
[[redirects]]
  from = "https://www.secondaryglazingspecialist.com/*"
  to = "https://secondaryglazingspecialist.com/:splat"
  status = 301
  force = true

# Remove trailing slashes to prevent duplicate content (before SPA catch-all)
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true

# Legacy URL redirects from old site / .htaccess
[[redirects]]
  from = "/noise-calculator"
  to = "/specialized/noise-reduction#calculator"
  status = 301
  force = true

[[redirects]]
  from = "/sustainability-impact-tracker"
  to = "/sustainability-impact-tracker-secondary-glazing"
  status = 301
  force = true

[[redirects]]
  from = "/secondary-glazing-building-regulations"
  to = "/specialized/secondary-glazing-building-regulations"
  status = 301
  force = true

[[redirects]]
  from = "/air-gap-secondary-glazing"
  to = "/specialized/air-gap-secondary-glazing"
  status = 301
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), microphone=()"

# Long-term cache for hashed Vite assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-term cache for uploaded images
[[headers]]
  for = "/lovable-uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML so content updates propagate immediately
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
